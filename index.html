<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Perspectives Podcast</title>
  <script>
    fetch("/The%20podcast%20website%20code.html", { cache: "no-store" })
      .then((response) => response.text())
      .then((html) => {
        document.open();
        document.write(html);
        document.close();
      })
      .catch(() => {
        document.body.innerHTML =
          "<main style='font-family: Arial, sans-serif; padding: 24px;'>" +
          "<h1>Professional Perspectives Podcast</h1>" +
          "<p>Unable to load the site shell. Please retry.</p>" +
          "</main>";
      });
  </script>
</head>
<body>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/The%20podcast%20website%20code.html" />
  </noscript>
</body>
</html>
